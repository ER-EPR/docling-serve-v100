name: Build Docling Serve CU126 (V100)

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button click
  schedule:
    - cron: '1 2 3 */3 *' # Optional: Automatically runs every Sunday at midnight to grab upstream updates

permissions:
  packages: write
  contents: read

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the absolute latest code directly from the official repository
      - name: Checkout upstream Docling Serve repository
        uses: actions/checkout@v4
        with:
          repository: docling-project/docling-serve
          ref: main

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to your personal GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub provides this token automatically!
          
      - name: Read Docker Image Identifiers
        run: echo IMAGE_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      # 4. Build with the cu126 arguments and push to your account
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}:latest
          platforms: linux/amd64
          build-args: |
            UV_SYNC_EXTRA_ARGS=--no-group pypi --group cu126
